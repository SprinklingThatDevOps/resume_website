version: 1
frontend:
  phases:
    preBuild:
      commands:
        - nvm install 22.22.2
        - nvm use 22.22.2
        - node --version
        - npm install -g pnpm@11.7.0
        - pnpm --version
        - pnpm config set store-dir .pnpm-store
        - rm -rf node_modules
        - pnpm install --frozen-lockfile --prod=false
        - pnpm exec vite --version
    build:
      commands:
        - pnpm build
  artifacts:
    baseDirectory: dist
    files:
      - '**/*'
  cache:
    paths:
      - .pnpm-store/**/*
